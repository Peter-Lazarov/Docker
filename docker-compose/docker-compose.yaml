version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: postgres_movement
    environment:
      POSTGRES_USER: movement
      POSTGRES_PASSWORD: movement
      POSTGRES_DB: movementdb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  mongodb:
    image: mongo:6
    container_name: mongodb_tracking
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

volumes:
  postgres_data:
  mongo_data:
